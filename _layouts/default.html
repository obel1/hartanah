<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  {% if page.title %}
    <title>{{ page.title }} — {{ site.title }}</title>
    <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
    <meta property="og:title" content="{{ page.title }} — {{ site.title }}">
    <meta property="og:description" content="{{ page.excerpt | default: site.description | strip_html | normalize_whitespace | truncate: 160 }}">
    <meta property="og:url" content="{{ page.url | absolute_url }}">
  {% else %}
    <title>{{ site.title }}</title>
    <meta name="description" content="{{ site.description }}">
    <meta property="og:title" content="{{ site.title }}">
    <meta property="og:description" content="{{ site.description }}">
    <meta property="og:url" content="{{ site.url }}">
  {% endif %}

  <meta property="og:type" content="website">
  <meta property="og:image" content="{{ site.url }}/assets/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:site_name" content="{{ site.title }}">
  <meta name="author" content="{{ site.author }}">
  <meta name="robots" content="index, follow">

  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
    <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-783H1B6LZJ"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-783H1B6LZJ');
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --bg: #fdfdfd;
      --ink: #111111;
      --ink-light: #444444;
      --ink-muted: #888888;
      --border: #e8e8e8;
      --accent: #2a5caa;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.7;
      min-height: 100vh;
    }

    .site-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
    }

    .header-inner {
      max-width: 860px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .site-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.01em;
    }

    .header-nav a {
      color: var(--ink-muted);
      text-decoration: none;
      font-size: 0.8rem;
      font-weight: 500;
      transition: color 0.15s;
    }

    .header-nav a:hover { color: var(--ink); }

    .site-main {
      max-width: 860px;
      margin: 0 auto;
      padding: 2.5rem 2rem 5rem;
    }

    .site-footer {
      border-top: 1px solid var(--border);
      text-align: center;
      padding: 1.5rem 2rem;
      font-size: 0.78rem;
      color: var(--ink-muted);
    }

    .site-footer a { color: var(--ink-muted); text-decoration: none; border-bottom: 1px solid var(--border); }
    .site-footer a:hover { color: var(--ink); }

    @media (max-width: 600px) {
      .site-main { padding: 1.5rem 1.25rem 4rem; }
    }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a class="site-title" href="{{ '/' | relative_url }}">Insurance &amp; Takaful FAQ</a>
      <nav class="header-nav">
        <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
      </nav>
    </div>
  </header>

  <main class="site-main">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ 'now' | date: "%Y" }} Wan Muthalib &nbsp;·&nbsp; AIA Agent, Kuala Lumpur &nbsp;·&nbsp;
    <a href="https://wa.me/60147315389">+6014 731 5389</a> &nbsp;·&nbsp;
    <a href="mailto:wa.muthalib@gmail.com">wa.muthalib@gmail.com</a></p>
  </footer>

</body>
</html>
