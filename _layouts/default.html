<!DOCTYPE html>
<html lang="{{ page.language | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- ── GOOGLE ANALYTICS ──────────────────────────────────────
       Replace G-XXXXXXXXXX (both places) with your NEW GA4 property ID
       for this site. Do NOT reuse the wan-aia.online ID — create a new
       property in analytics.google.com so stats stay separate. -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-XXXXXXXXXX');
  </script>

  {% seo %}
  <meta property="og:image" content="{{ '/assets/og-image.png' | absolute_url }}">

  <link rel="icon" type="image/svg+xml" href="{{ '/favicon.svg' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Karla:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
</head>
<body>

  <header class="site-header">
    <a class="site-mark" href="{{ '/' | relative_url }}" aria-label="{{ site.title }} — home">
      <svg class="mark" viewBox="0 0 32 32" aria-hidden="true"><path d="M4 14 L16 4 L28 14 V28 H19 V19 H13 V28 H4 Z" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round"/></svg>
      <span class="site-title">{{ site.title }}</span>
    </a>
    <nav class="site-nav" aria-label="Main">
      <a href="{{ '/' | relative_url }}">Posts</a>
      <a href="{{ '/tags/' | relative_url }}">Topics</a>
    </nav>
  </header>

  <main class="wrap">
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>&copy; {{ 'now' | date: '%Y' }} {{ site.title }} &middot; {{ site.tagline }}</p>
  </footer>

</body>
</html>
